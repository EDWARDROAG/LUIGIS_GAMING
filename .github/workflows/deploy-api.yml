name: Deploy API

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/api/**'
      - 'package-lock.json'
      - 'render.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify API syntax
        working-directory: apps/api
        run: node --check src/server.js

  deploy-render:
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    environment:
      name: production-api
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  deploy-railway:
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN != '' && vars.RAILWAY_SERVICE_ID != '' }}
    environment:
      name: production-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_SERVICE_ID }}" --detach
